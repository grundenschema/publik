<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veckans ord</title>
<style>
:root {
  --bg:#050816;
  --bg2:#0a1030;
  --panel:#0f1738;
  --panel2:#101b45;
  --line:#36f2ff;
  --text:#f8fbff;
  --muted:#a7b7d6;
  --cyan:#36f2ff;
  --purple:#a855f7;
  --yellow:#ffd84d;
  --green:#54ff87;
  --red:#ff5a8a;
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:
    linear-gradient(180deg, rgba(54,242,255,0.08), transparent 18%),
    linear-gradient(135deg, #040713, #0a1030 55%, #060918);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.app { width:100%; max-width:980px; }
.frame {
  border:3px solid var(--cyan);
  background:linear-gradient(180deg, rgba(168,85,247,0.08), rgba(54,242,255,0.04)), var(--bg);
  box-shadow:0 0 0 4px rgba(168,85,247,0.18), 0 0 30px rgba(54,242,255,0.18), 0 20px 70px rgba(0,0,0,0.55);
  clip-path: polygon(0 12px, 12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px));
  overflow:hidden;
  position:relative;
}
.hero {
  padding:22px 24px 18px;
  border-bottom:3px solid var(--purple);
  background:linear-gradient(90deg, rgba(168,85,247,0.18), rgba(54,242,255,0.12)),
  repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 18px, rgba(0,0,0,0) 18px 36px);
}
.hero-top {
  display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;
}
h1 {
  margin:0; font-size:clamp(34px, 6vw, 64px); line-height:0.9; letter-spacing:2px; text-transform:uppercase;
  text-shadow:0 0 10px rgba(54,242,255,0.25), 0 0 18px rgba(168,85,247,0.22);
}
.sub {
  margin-top:10px; color:var(--muted); font-size:14px; text-transform:uppercase; letter-spacing:1px;
}
.badge {
  border:2px solid var(--yellow); color:var(--yellow); padding:10px 14px; font-weight:900; text-transform:uppercase; letter-spacing:1px;
  background:rgba(255,216,77,0.08); box-shadow:0 0 12px rgba(255,216,77,0.15);
  clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
}
.content {
  display:grid; grid-template-columns:1.3fr 0.8fr; gap:18px; padding:18px;
}
.panel {
  background: linear-gradient(180deg, rgba(16,27,69,0.95), rgba(10,16,48,0.95));
  border:2px solid #22366f; box-shadow: inset 0 0 0 2px rgba(54,242,255,0.06); padding:18px;
  clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
}
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
.stat {
  border:2px solid #29417f; background:linear-gradient(180deg, rgba(11,18,49,0.95), rgba(8,13,36,0.95));
  padding:12px; min-height:84px;
  clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
}
.stat-label { color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-size:24px; font-weight:900; text-transform:uppercase; letter-spacing:1px; }
.stat-value.small { font-size:18px; }
.mission {
  border:2px solid var(--purple);
  background:linear-gradient(180deg, rgba(168,85,247,0.10), rgba(54,242,255,0.05)), var(--panel);
  min-height:280px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:18px;
  box-shadow:0 0 16px rgba(168,85,247,0.16), inset 0 0 20px rgba(54,242,255,0.04);
  clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
}
.mission-mini { color:var(--yellow); text-transform:uppercase; font-size:12px; letter-spacing:2px; margin-bottom:10px; }
.mission-big {
  font-size:clamp(28px, 5vw, 48px); font-weight:1000; text-transform:uppercase; letter-spacing:2px;
  text-shadow:0 0 12px rgba(54,242,255,0.16);
}
.level-icon {
  font-size:56px; line-height:1; margin:10px 0 8px; color:var(--yellow);
  text-shadow:0 0 10px rgba(255,216,77,0.3), 0 0 20px rgba(168,85,247,0.18);
}
.progress-wrap {
  width:100%; max-width:480px; margin:14px auto 0;
}
.progress-track {
  height:22px; border:2px solid var(--cyan); background:#070d24; overflow:hidden;
  clip-path: polygon(0 6px, 6px 0, calc(100% - 6px) 0, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0 calc(100% - 6px));
  box-shadow: inset 0 0 14px rgba(54,242,255,0.06);
}
.progress-fill {
  height:100%; width:0%; background:linear-gradient(90deg, var(--green), var(--yellow));
  box-shadow:0 0 14px rgba(84,255,135,0.25);
  transition:width 0.25s ease;
}
.progress-text {
  margin-top:8px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;
}
.sentence {
  margin-top:14px; color:#dfe9ff; font-size:22px; font-weight:700; line-height:1.4; max-width:90%;
}
.hint {
  color:var(--muted); font-size:14px; text-transform:uppercase; letter-spacing:1px; min-height:20px; margin-top:10px;
}
.input-wrap { margin-top:14px; }
input {
  width:100%; border:2px solid var(--cyan); background:#070d24; color:var(--text); padding:18px; font-size:28px; text-align:center;
  text-transform:lowercase; outline:none;
  clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
  box-shadow: inset 0 0 14px rgba(54,242,255,0.06);
}
input:focus { box-shadow:0 0 0 4px rgba(54,242,255,0.12), inset 0 0 14px rgba(54,242,255,0.06); }
.actions { display:grid; gap:10px; margin-top:14px; }
button {
  border:none; cursor:pointer; padding:18px; font-size:20px; font-weight:1000; text-transform:uppercase; letter-spacing:1px; color:#07101f;
  background:linear-gradient(180deg, var(--yellow), #ffb703);
  box-shadow:0 8px 0 #a96f00, 0 14px 24px rgba(255,183,3,0.18);
  clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
  transition:transform 0.08s ease, filter 0.08s ease;
}
button:hover { filter:brightness(1.04); transform:translateY(-1px); }
button:active { transform:translateY(4px); box-shadow:0 4px 0 #a96f00, 0 10px 18px rgba(255,183,3,0.18); }
.result {
  margin-top:14px; min-height:76px; padding:16px; display:flex; align-items:center; justify-content:center; text-align:center;
  font-size:24px; font-weight:1000; text-transform:uppercase; letter-spacing:1px; border:2px solid #29417f; background:#070d24; color:var(--muted);
  clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
}
.result.ok { color:var(--green); border-color:var(--green); box-shadow:0 0 16px rgba(84,255,135,0.14); background:rgba(84,255,135,0.10); }
.result.warn { color:var(--yellow); border-color:var(--yellow); box-shadow:0 0 16px rgba(255,216,77,0.12); background:rgba(255,216,77,0.08); }
.result.bad { color:var(--red); border-color:var(--red); box-shadow:0 0 16px rgba(255,90,138,0.12); background:rgba(255,90,138,0.10); }
.reveal-word {
  margin-top:14px; padding:18px; text-align:center; border:3px solid var(--yellow);
  background:rgba(255,216,77,0.10); color:var(--yellow); font-size:clamp(28px,5vw,44px);
  font-weight:1000; text-transform:uppercase; letter-spacing:2px; display:none;
  box-shadow:0 0 20px rgba(255,216,77,0.18);
  clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
}
.reveal-word.show { display:block; }

.frame.correct-flash {
  box-shadow:
    0 0 0 4px rgba(84,255,135,0.22),
    0 0 34px rgba(84,255,135,0.22),
    0 20px 70px rgba(0,0,0,0.55);
}
.frame.wrong-flash {
  box-shadow:
    0 0 0 4px rgba(255,90,138,0.22),
    0 0 34px rgba(255,90,138,0.22),
    0 20px 70px rgba(0,0,0,0.55);
}
.mission.correct-flash {
  border-color: var(--green);
  box-shadow:0 0 22px rgba(84,255,135,0.20), inset 0 0 22px rgba(84,255,135,0.08);
}
.mission.wrong-flash {
  border-color: var(--red);
  box-shadow:0 0 22px rgba(255,90,138,0.20), inset 0 0 22px rgba(255,90,138,0.08);
}
input.correct-flash {
  border-color: var(--green);
  box-shadow:0 0 0 4px rgba(84,255,135,0.16), inset 0 0 14px rgba(84,255,135,0.08);
}
input.wrong-flash {
  border-color: var(--red);
  box-shadow:0 0 0 4px rgba(255,90,138,0.16), inset 0 0 14px rgba(255,90,138,0.08);
}
.side-title { margin:0 0 10px 0; color:var(--cyan); font-size:16px; text-transform:uppercase; letter-spacing:1px; }
.progress-list { display:grid; gap:10px; }
.level {
  padding:12px 14px; border:2px solid #29417f; background:#070d24; display:flex; justify-content:space-between; align-items:center; gap:10px;
  font-weight:900; text-transform:uppercase; font-size:13px; letter-spacing:1px;
  clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
}
.level.current { border-color:var(--purple); box-shadow:0 0 14px rgba(168,85,247,0.14); }
.level.done { border-color:var(--green); }
.history { margin-top:18px; }
.history-item {
  margin-top:8px; padding:10px 12px; border:2px solid #22366f; background:#070d24; display:flex; justify-content:space-between; gap:10px;
  font-size:13px; color:#d6e2ff; text-transform:uppercase;
  clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
}
.footer { margin-top:12px; color:var(--muted); font-size:12px; text-align:center; text-transform:uppercase; letter-spacing:1px; }
.hearts { color:var(--red); letter-spacing:4px; text-shadow:0 0 8px rgba(255,90,138,0.16); }
.lost { opacity:0.25; }
.overlay {
  position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(5,8,22,0.84); z-index:20;
}
.overlay.show { display:flex; }
.overlay-card {
  min-width:min(88vw,560px); text-align:center; padding:28px 20px; border:3px solid var(--green);
  background:linear-gradient(180deg, rgba(16,27,69,0.98), rgba(10,16,48,0.98));
  box-shadow:0 0 20px rgba(84,255,135,0.18), 0 0 40px rgba(54,242,255,0.08);
  clip-path: polygon(0 12px, 12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px));
}
.overlay-title {
  font-size:clamp(30px, 6vw, 60px); color:var(--green); font-weight:1000; text-transform:uppercase; letter-spacing:2px;
  text-shadow:0 0 14px rgba(84,255,135,0.25);
}
.overlay-sub {
  margin-top:12px; color:var(--text); font-size:20px; text-transform:uppercase; letter-spacing:1px;
}
.overlay-icon {
  margin-top:10px; font-size:58px; color:var(--yellow); text-shadow:0 0 12px rgba(255,216,77,0.24);
}
@media (max-width: 820px) {
  .content { grid-template-columns:1fr; }
  .stats { grid-template-columns:1fr 1fr; }
  input { font-size:24px; }
  .history-item { flex-direction:column; }
  .sentence { font-size:20px; max-width:100%; }
}
</style>
</head>
<body>
<div class="app">
  <div class="frame">
    <div class="hero">
      <div class="hero-top">
        <div>
          <h1>Veckans ord</h1>
          <div class="sub">Tryck på Starta ljud / Lyssna. Hör ordet. Skriv rätt.</div>
        </div>
        <div class="badge" id="titleBadge">Level 1</div>
      </div>
    </div>

    <div class="content">
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Ord</div>
            <div class="stat-value" id="wordCount">1 / 10</div>
          </div>
          <div class="stat">
            <div class="stat-label">Rätt</div>
            <div class="stat-value" id="scoreCount">0 / 10</div>
          </div>
          <div class="stat">
            <div class="stat-label">Liv</div>
            <div class="stat-value small hearts" id="livesBox">♥ ♥ ♥</div>
          </div>
          <div class="stat">
            <div class="stat-label">Status</div>
            <div class="stat-value small" id="statusMini">Pågår</div>
          </div>
        </div>

        <div class="mission" id="missionBox">
          <div class="mission-mini">Level</div>
          <div class="mission-big" id="goalText">10 kvar</div>
          <div class="level-icon" id="levelIcon">◆</div>
          <div class="progress-wrap">
            <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
            <div class="progress-text" id="progressText">0% klar</div>
          </div>
          <div class="sentence" id="sentenceText"></div>
          <div class="hint" id="hintText">Tryck på lyssna</div>
        </div>

        <div class="input-wrap">
          <input id="answerInput" type="text" placeholder="Skriv ordet här" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="actions">
          <button id="listenBtn">Starta ljud / Lyssna</button>
        </div>

        <div id="resultBox" class="result">Tryck på lyssna</div>

        <div id="revealWordBox" class="reveal-word" aria-live="assertive"></div>

        <div class="footer">Efter 3 fel visas ordet tydligt innan leveln startar om</div>
      </div>

      <div class="panel">
        <h2 class="side-title">Framsteg</h2>
        <div class="progress-list" id="progressList"></div>

        <div class="history">
          <h2 class="side-title">Senaste resultat</h2>
          <div id="historyList"></div>
        </div>
      </div>
    </div>

    <div id="clearOverlay" class="overlay">
      <div class="overlay-card">
        <div class="overlay-title">Level klar</div>
        <div class="overlay-icon" id="overlayIcon">◆</div>
        <div class="overlay-sub" id="overlaySub">Nästa level startar</div>
      </div>
    </div>
  </div>
</div>

<script>
const levels = [["stänkte", "yngsta", "precis", "favorit", "present", "medicin", "tyvärr", "biljett", "perfekt", "promenad"], ["speciell", "mallig", "buckla", "nässla", "hygglig", "ramlade", "teckning", "besättning", "skillnad", "simning"], ["tallrik", "yttra", "siffrorna", "främre", "mest", "tretton", "enkelt", "hette", "förresten", "helst"], ["bergen", "verkligen", "nerver", "hemskt", "Sverige", "längre", "händer", "tänder", "stränder", "män"], ["stänger", "längst", "bäst", "äldst", "tänkte", "hälften", "bägge", "ålder", "håller", "påsken"], ["morgon", "också", "sommar", "kommer", "hoppar", "klockan", "kompis", "konstig", "dockvagn", "begagnade"], ["punktering", "sprungit", "signalhorn", "ingenting", "bensindunk", "ösregn"]];
const sentences = {"stänkte": "Vattnet ___ på jackan.", "yngsta": "Hon är den ___ i familjen.", "precis": "Jag kom ___ i tid.", "favorit": "Det är min ___ låt.", "present": "Han fick en ___ på sin födelsedag.", "medicin": "Hon tog sin ___ på morgonen.", "tyvärr": "___ kan jag inte följa med.", "biljett": "Han köpte en ___ till bussen.", "perfekt": "Det blev ___.", "promenad": "Vi tog en ___ i skogen.", "speciell": "Det var en ___ dag.", "mallig": "Han blev lite ___ efter vinsten.", "buckla": "Bilen fick en ___ i dörren.", "nässla": "Han råkade röra en ___.", "hygglig": "Hon är en ___ person.", "ramlade": "Han ___ av cykeln.", "teckning": "Hon gjorde en fin ___.", "besättning": "Båtens ___ arbetade hela natten.", "skillnad": "Jag märker ingen ___.", "simning": "På idrotten hade vi ___.", "tallrik": "Lägg maten på en ___.", "yttra": "Hon vågade inte ___ något.", "siffrorna": "___ på tavlan var svåra.", "främre": "Den ___ delen av bilen skadades.", "mest": "Hon gillar glass ___.", "tretton": "Han fyllde ___ år.", "enkelt": "Det var väldigt ___.", "hette": "Hon ___ Anna.", "förresten": "___ så kommer jag senare.", "helst": "Jag stannar ___ hemma.", "bergen": "Vi såg ___ långt borta.", "verkligen": "Det var ___ roligt.", "nerver": "Han hade starka ___.", "hemskt": "Det var ___ kallt.", "Sverige": "Han bor i ___.", "längre": "Den här vägen är ___.", "händer": "Tvätta dina ___.", "tänder": "Borsta dina ___.", "stränder": "Vi gick längs ___.", "män": "Flera ___ stod där.", "stänger": "Affären ___ klockan sex.", "längst": "Han sprang ___.", "bäst": "Hon är ___ i laget.", "äldst": "Han är ___ i gruppen.", "tänkte": "Jag ___ på dig.", "hälften": "Jag åt ___ av kakan.", "bägge": "___ kom samtidigt.", "ålder": "Hon frågade om min ___.", "håller": "Han ___ i repet.", "påsken": "Vi firar ___ tillsammans.", "morgon": "Vi ses i ___.", "också": "Jag vill ___ följa med.", "sommar": "Jag gillar ___ mest.", "kommer": "Han ___ snart.", "hoppar": "Katten ___ upp.", "klockan": "Vad är ___?", "kompis": "Han är min ___.", "konstig": "Det där var ___.", "dockvagn": "Barnet låg i en ___.", "begagnade": "I affären säljer de ___ cyklar.", "punktering": "Bilen fick ___.", "sprungit": "Hon har ___ långt.", "signalhorn": "Båten tutade med sitt ___.", "ingenting": "Jag hörde ___.", "bensindunk": "Han fyllde en ___.", "ösregn": "Det började ___."};
const icons = ["◆", "▲", "■", "⬣", "✦", "⬢", "⬟"];
const STORAGE_KEY = "veckans_ord_geometry_plus_v2";
const PROGRESS_KEY = "veckans_ord_geometry_plus_progress_v2";

let audioUnlocked = false;

const titleBadge = document.getElementById("titleBadge");
const wordCount = document.getElementById("wordCount");
const scoreCount = document.getElementById("scoreCount");
const livesBox = document.getElementById("livesBox");
const statusMini = document.getElementById("statusMini");
const goalText = document.getElementById("goalText");
const hintText = document.getElementById("hintText");
const sentenceText = document.getElementById("sentenceText");
const answerInput = document.getElementById("answerInput");
const listenBtn = document.getElementById("listenBtn");
const resultBox = document.getElementById("resultBox");
const revealWordBox = document.getElementById("revealWordBox");
const historyList = document.getElementById("historyList");
const progressList = document.getElementById("progressList");
const levelIcon = document.getElementById("levelIcon");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const clearOverlay = document.getElementById("clearOverlay");
const overlayIcon = document.getElementById("overlayIcon");
const overlaySub = document.getElementById("overlaySub");
const frame = document.querySelector(".frame");
const missionBox = document.getElementById("missionBox");

let state = {
  levelIndex: 0,
  wordIndex: 0,
  correctCount: 0,
  wrongAttemptsOnWord: 0,
  currentWord: levels[0][0],
  maxAttempts: 3,
  locked: false
};

function normalizeText(text) {
  return (text || "").trim().toLowerCase();
}

function getResults() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveResult(levelNumber, correctCount, passed, note = "") {
  const results = getResults();
  results.unshift({
    date: new Date().toLocaleString("sv-SE"),
    level: levelNumber,
    score: correctCount + "/" + levels[levelNumber - 1].length,
    passed: passed ? "Klarad" : "Ej klarad",
    note
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(results.slice(0, 12)));
  renderResults();
}

function getUnlockedLevel() {
  try {
    const data = JSON.parse(localStorage.getItem(PROGRESS_KEY));
    return Math.max(1, Math.min(levels.length, data?.unlockedLevel || 1));
  } catch {
    return 1;
  }
}

function setUnlockedLevel(n) {
  localStorage.setItem(PROGRESS_KEY, JSON.stringify({ unlockedLevel: n }));
  renderProgress();
}

function getStartLevel() {
  const unlocked = getUnlockedLevel();
  return Math.min(levels.length - 1, Math.max(0, unlocked - 1));
}

function renderResults() {
  const results = getResults();
  historyList.innerHTML = "";
  if (!results.length) {
    historyList.innerHTML = '<div class="history-item"><span>Inga resultat ännu</span><span></span></div>';
    return;
  }
  results.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    const extra = item.note ? " · " + item.note : "";
    div.innerHTML = `<span>${item.date}</span><span>Level ${item.level} · ${item.score} · ${item.passed}${extra}</span>`;
    historyList.appendChild(div);
  });
}

function renderProgress() {
  const unlocked = getUnlockedLevel();
  progressList.innerHTML = "";
  levels.forEach((level, i) => {
    const div = document.createElement("div");
    let cls = "level";
    if (i < unlocked - 1) cls += " done";
    if (i === state.levelIndex) cls += " current";
    const icon = icons[i % icons.length];
    const status = i < unlocked - 1 ? "klar" : i === unlocked - 1 ? "nu" : "låst";
    div.className = cls;
    div.innerHTML = `<span>${icon} Level ${i + 1}</span><span>${level.length} ord · ${status}</span>`;
    progressList.appendChild(div);
  });
}

function setResult(message, type = "") {
  resultBox.textContent = message;
  resultBox.className = "result" + (type ? " " + type : "");
}

function showRevealWord(word) {
  revealWordBox.textContent = "Ordet är: " + word;
  revealWordBox.classList.add("show");
}

function hideRevealWord() {
  revealWordBox.textContent = "";
  revealWordBox.classList.remove("show");
}

function updateLives() {
  const left = state.maxAttempts - state.wrongAttemptsOnWord;
  let html = "";
  for (let i = 0; i < state.maxAttempts; i++) {
    html += `<span class="${i < left ? "" : "lost"}">♥</span> `;
  }
  livesBox.innerHTML = html.trim();
}

function updateProgressBar() {
  const total = levels[state.levelIndex].length;
  const percent = Math.round((state.correctCount / total) * 100);
  progressFill.style.width = percent + "%";
  progressText.textContent = percent + "% klar";
}

function updateUI() {
  const total = levels[state.levelIndex].length;
  titleBadge.textContent = "Level " + (state.levelIndex + 1);
  wordCount.textContent = (state.wordIndex + 1) + " / " + total;
  scoreCount.textContent = state.correctCount + " / " + total;
  goalText.textContent = (total - state.correctCount) + " kvar";
  sentenceText.textContent = sentences[state.currentWord] || "";
  hintText.textContent = "3 liv per ord";
  levelIcon.textContent = icons[state.levelIndex % icons.length];
  updateLives();
  updateProgressBar();
  renderProgress();
}

function getBestVoice() {
  const voices = window.speechSynthesis.getVoices() || [];
  return voices.find(v => v.lang === "sv-SE") ||
         voices.find(v => v.lang && v.lang.toLowerCase().startsWith("sv")) ||
         null;
}

function speakOnce(text, delay = 0) {
  setTimeout(() => {
    try {
      const synth = window.speechSynthesis;
      if (!synth) {
        setResult("Ljud stöds inte här", "warn");
        return;
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "sv-SE";
      utterance.rate = 0.42;
      utterance.pitch = 0.9;
      utterance.volume = 1;
      const voice = getBestVoice();
      if (voice) utterance.voice = voice;
      synth.speak(utterance);
    } catch (e) {
      setResult("Ljudet startade inte", "warn");
    }
  }, delay);
}

function unlockAudio() {
  audioUnlocked = true;
  try {
    const synth = window.speechSynthesis;
    if (synth) {
      const primer = new SpeechSynthesisUtterance(" ");
      primer.volume = 0;
      synth.speak(primer);
    }
  } catch (e) {}
}

function speakCurrentWord() {
  const synth = window.speechSynthesis;
  if (!synth) {
    setResult("Ljud stöds inte här", "warn");
    return;
  }

  unlockAudio();

  try {
    synth.cancel();
    speakOnce(state.currentWord, 0);
    speakOnce(state.currentWord, 950);
    setResult("Ljud spelas upp. Lyssna och skriv ordet", "");
  } catch (e) {
    setResult("Ljudet startade inte", "warn");
  }
}

function loadWord() {
  state.currentWord = levels[state.levelIndex][state.wordIndex];
  state.wrongAttemptsOnWord = 0;
  state.locked = false;
  answerInput.value = "";
  answerInput.disabled = false;
  statusMini.textContent = "Pågår";
  hideRevealWord();
  setResult(audioUnlocked ? "Tryck på Starta ljud / Lyssna" : "Tryck på Starta ljud / Lyssna för att höra ordet", "");
  updateUI();
  answerInput.focus();
}

function startLevel(levelIndex) {
  state.levelIndex = levelIndex;
  state.wordIndex = 0;
  state.correctCount = 0;
  loadWord();
}

function showLevelClear(nextText) {
  overlayIcon.textContent = icons[state.levelIndex % icons.length];
  overlaySub.textContent = nextText;
  clearOverlay.classList.add("show");
}

function hideLevelClear() {
  clearOverlay.classList.remove("show");
}

function completeLevel() {
  saveResult(state.levelIndex + 1, state.correctCount, true);
  const nextLevel = state.levelIndex + 1;
  state.locked = true;
  answerInput.disabled = true;
  statusMini.textContent = "Klar";

  if (nextLevel < levels.length) {
    setUnlockedLevel(Math.max(getUnlockedLevel(), nextLevel + 1));
    showLevelClear("Nästa level startar");
    setTimeout(() => {
      hideLevelClear();
      startLevel(nextLevel);
    }, 1800);
  } else {
    setUnlockedLevel(levels.length);
    showLevelClear("Alla levelar klara");
  }
}

function failLevel() {
  saveResult(state.levelIndex + 1, state.correctCount, false, "3 fel på ett ord");
  showRevealWord(state.currentWord);
  setResult("Fel 3 gånger", "bad");
  statusMini.textContent = "Omstart";
  state.locked = true;
  answerInput.disabled = true;
  setTimeout(() => {
    setResult("Ordet visas tydligt innan omstart", "warn");
  }, 1200);
  setTimeout(() => startLevel(state.levelIndex), 3400);
}

function handleCorrect() {
  state.correctCount += 1;
  statusMini.textContent = "Rätt";
  setResult("Rätt", "ok");
  hideRevealWord();
  flashFeedback("ok");
  state.locked = true;
  answerInput.disabled = true;
  updateUI();

  if (state.wordIndex === levels[state.levelIndex].length - 1) {
    setTimeout(completeLevel, 700);
  } else {
    setTimeout(() => {
      state.wordIndex += 1;
      loadWord();
    }, 450);
  }
}

function handleWrong() {
  state.wrongAttemptsOnWord += 1;
  const left = state.maxAttempts - state.wrongAttemptsOnWord;
  updateUI();

  if (left > 0) {
    statusMini.textContent = "Fel";
    setResult("Fel · " + left + " liv kvar", "bad");
    flashFeedback("bad");
    answerInput.select();
    setTimeout(speakCurrentWord, 350);
  } else {
    flashFeedback("bad");
    failLevel();
  }
}

function submitAnswer() {
  if (state.locked) return;
  const input = normalizeText(answerInput.value);
  const correct = normalizeText(state.currentWord);
  if (!input) {
    setResult("Skriv ordet", "warn");
    return;
  }
  if (input === correct) handleCorrect();
  else handleWrong();
}

answerInput.addEventListener("input", () => {
  if (state.locked) return;
  const input = normalizeText(answerInput.value);
  const correct = normalizeText(state.currentWord);
  if (input && input === correct) submitAnswer();
});

answerInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitAnswer();
});

listenBtn.addEventListener("click", () => {
  unlockAudio();
  speakCurrentWord();
});

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function flashFeedback(type) {
  frame.classList.remove("correct-flash","wrong-flash");
  missionBox.classList.remove("correct-flash","wrong-flash");
  answerInput.classList.remove("correct-flash","wrong-flash");
  void frame.offsetWidth;
  const cls = type === "ok" ? "correct-flash" : "wrong-flash";
  frame.classList.add(cls);
  missionBox.classList.add(cls);
  answerInput.classList.add(cls);
  setTimeout(() => {
    frame.classList.remove(cls);
    missionBox.classList.remove(cls);
    answerInput.classList.remove(cls);
  }, 550);
}

renderResults();
renderProgress();
startLevel(getStartLevel());
</script>
</body>
</html>
