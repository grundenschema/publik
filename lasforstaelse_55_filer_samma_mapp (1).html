<!doctype html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Läsförståelse – historiebibliotek</title>
<style>
:root {
  --bg:#0b1026; --panel:#12183b; --line:#3b4cc0; --text:#ffffff;
  --muted:#b7c2ff; --green:#7CFF7C; --red:#FF6B6B; --yellow:#ffd84d;
}
* { box-sizing:border-box; }
body {
  margin:0; padding:20px; background:var(--bg); color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}
.container { max-width:1000px; margin:auto; }
.topbar {
  display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
  margin-bottom:18px;
}
h1 { margin:0; font-size:clamp(28px,5vw,48px); }
.small { color:var(--muted); font-size:14px; }
.box {
  background:var(--panel); border:2px solid var(--line); padding:18px; margin-bottom:18px;
}
.title {
  color:var(--yellow); font-size:30px; font-weight:900; text-transform:uppercase; margin-bottom:14px;
}
.text {
  white-space:pre-wrap; line-height:1.7; max-height:60vh; overflow:auto;
}
.question {
  margin-top:14px; padding:14px; border:1px solid var(--line); background:#0d1432;
}
.qtitle { font-weight:900; margin-bottom:10px; }
label.opt {
  display:block; padding:10px 12px; margin:8px 0; border:1px solid #2e3d91; background:#0a112d;
}
label.opt.correct { border-color:var(--green); }
label.opt.wrong { border-color:var(--red); }
.actions {
  display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;
}
button {
  border:none; padding:12px 16px; font-size:16px; font-weight:900; cursor:pointer;
  background:var(--yellow); color:#07101f;
}
button.alt {
  background:#1a285a; color:var(--text); border:2px solid var(--line);
}
.result {
  margin-top:16px; padding:14px; border:2px solid var(--line); background:#0a112d; min-height:56px;
  display:flex; align-items:center; font-weight:900;
}
.result.ok { border-color:var(--green); color:var(--green); }
.result.warn { border-color:var(--yellow); color:var(--yellow); }
.result.bad { border-color:var(--red); color:var(--red); }
.status { color:var(--muted); margin-bottom:12px; }
@media (max-width: 800px) {
  body { padding:14px; }
  .title { font-size:24px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>Historiebibliotek</h1>
      <div class="small">Läser .txt-filer från samma mapp som HTML-filen</div>
    </div>
    <div class="small" id="counter">Text 1 / 55</div>
  </div>

  <div class="box">
    <div class="title" id="title">Laddar...</div>
    <div class="text" id="text"></div>
  </div>

  <div class="box">
    <div class="status" id="status">Laddar frågor...</div>
    <div id="questions"></div>
    <div class="actions">
      <button onclick="checkAnswers()">Rätta</button>
      <button class="alt" onclick="prevText()">Föregående text</button>
      <button class="alt" onclick="nextText()">Nästa text</button>
    </div>
    <div class="result" id="result">Svara på frågorna</div>
  </div>
</div>

<script>
const readingFiles = [
"01_Stockholms_blodbad.txt",
"02_Vikingatiden.txt",
"03_Palmemordet.txt",
"04_Tjernobyl.txt",
"05_Hitler_och_andra_världskriget.txt",
"06_Stalin.txt",
"07_Titanic.txt",
"08_Berlinmurens_fall.txt",
"09_Kubakrisen.txt",
"10_Jack_the_Ripper.txt",
"11_Napoleon.txt",
"12_Alexander_den_store.txt",
"13_Marco_Polo.txt",
"14_Mahatma_Gandhi.txt",
"15_Djingis_Khan.txt",
"16_Rasputin.txt",
"17_Vlad_Tepes.txt",
"18_Area_51.txt",
"19_Atlantis.txt",
"20_Månlandningen.txt",
"21_Illuminati.txt",
"22_Bermudatriangeln.txt",
"23_Dyatlovpasset.txt",
"24_D.B._Cooper.txt",
"25_Jonestown.txt",
"26_Heaven's_Gate.txt",
"27_Charles_Manson.txt",
"28_Hindenburg.txt",
"29_Vietnamkriget.txt",
"30_Koreakriget.txt",
"31_Kalmarunionen.txt",
"32_Gustav_Vasa.txt",
"33_Franska_revolutionen.txt",
"34_Industriella_revolutionen.txt",
"35_Amerikanska_revolutionen.txt",
"36_Romarriket.txt",
"37_Sparta_och_Aten.txt",
"38_Korstågen.txt",
"39_Svarta_döden.txt",
"40_Upptäcktsresorna.txt",
"41_Mayariket.txt",
"42_Inkariket.txt",
"43_Samernas_historia.txt",
"44_Suezkanalen.txt",
"45_Kalla_kriget.txt",
"46_Rymdkapplöpningen.txt",
"47_Watergate.txt",
"48_Apartheid.txt",
"49_Nordkorea.txt",
"50_Kommunismen.txt",
"51_Israel–Palestinakonflikten.txt",
"52_Judendomens_historia.txt",
"53_Julius_Caesar.txt",
"54_Stockholm_på_medeltiden.txt",
"55_Medeltida_riddare.txt"
];

let currentIndex = 0;
let currentData = null;

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

async function loadCurrentText() {
  const file = readingFiles[currentIndex];
  document.getElementById("counter").textContent = `Text ${currentIndex + 1} / ${readingFiles.length}`;
  document.getElementById("title").textContent = "Laddar...";
  document.getElementById("text").textContent = "";
  document.getElementById("questions").innerHTML = "";
  document.getElementById("status").textContent = "Laddar frågor...";
  document.getElementById("result").className = "result";
  document.getElementById("result").textContent = "Laddar...";

  try {
    const response = await fetch(file);
    if (!response.ok) throw new Error("Kunde inte läsa filen: " + file);
    const raw = await response.text();
    currentData = parseTxt(raw);
    renderCurrentText();
  } catch (err) {
    currentData = null;
    document.getElementById("title").textContent = "Fel";
    document.getElementById("text").textContent =
      "Kunde inte läsa filen:\n" + file +
      "\n\nKontrollera att HTML-filen och .txt-filerna ligger i samma mapp på GitHub Pages.";
    document.getElementById("status").textContent = "Kunde inte läsa frågor";
    document.getElementById("result").className = "result bad";
    document.getElementById("result").textContent = "Filen kunde inte laddas";
  }
}

function parseTxt(raw) {
  const lines = raw.replace(/\r/g, "").split("\n");
  let title = "";
  let textParts = [];
  let questions = [];
  let mode = "";
  let currentQuestion = null;

  for (const originalLine of lines) {
    const line = originalLine.trim();

    if (line === "TITEL:") { mode = "title"; continue; }
    if (line === "TEXT:") { mode = "text"; continue; }
    if (line === "FRÅGA:") {
      mode = "question";
      currentQuestion = { q:"", answers:[], correct:0 };
      questions.push(currentQuestion);
      continue;
    }

    if (mode === "title") {
      if (line !== "") {
        title = line;
        mode = "";
      }
      continue;
    }

    if (mode === "text") {
      textParts.push(originalLine);
      continue;
    }

    if (mode === "question" && currentQuestion) {
      if (line === "") continue;

      if (currentQuestion.q === "") {
        currentQuestion.q = line;
        continue;
      }

      if (line.startsWith("*")) {
        currentQuestion.answers.push(line.substring(1).trim());
        currentQuestion.correct = currentQuestion.answers.length - 1;
        continue;
      }

      if (line.startsWith("-")) {
        currentQuestion.answers.push(line.substring(1).trim());
        continue;
      }
    }
  }

  return {
    title: title,
    text: textParts.join("\n").trim(),
    questions: questions
  };
}

function renderCurrentText() {
  if (!currentData) return;

  document.getElementById("title").textContent = currentData.title || "Utan titel";
  document.getElementById("text").textContent = currentData.text || "";
  document.getElementById("status").textContent = `Frågor: ${currentData.questions.length}`;
  document.getElementById("result").className = "result";
  document.getElementById("result").textContent = "Svara på frågorna";

  let html = "";
  currentData.questions.forEach((item, i) => {
    const shuffledAnswers = shuffle(
      item.answers.map((text, idx) => ({ text, correct: idx === item.correct }))
    );

    html += `<div class="question"><div class="qtitle">${i + 1}. ${item.q}</div>`;

    shuffledAnswers.forEach((answer, aIndex) => {
      html += `<label class="opt" id="q${i}a${aIndex}">
        <input type="radio" name="q${i}" value="${answer.correct ? "1" : "0"}"> ${answer.text}
      </label>`;
    });

    html += `</div>`;
  });

  document.getElementById("questions").innerHTML = html;
}

function checkAnswers() {
  if (!currentData) return;

  const total = currentData.questions.length;
  let correct = 0;

  document.querySelectorAll("label.opt").forEach(el => {
    el.classList.remove("correct", "wrong");
  });

  for (let i = 0; i < total; i++) {
    const options = document.querySelectorAll(`input[name="q${i}"]`);
    options.forEach(input => {
      const label = input.closest("label.opt");
      if (input.value === "1") label.classList.add("correct");
      if (input.checked && input.value !== "1") label.classList.add("wrong");
    });

    const checked = document.querySelector(`input[name="q${i}"]:checked`);
    if (checked && checked.value === "1") correct++;
  }

  const result = document.getElementById("result");
  result.className = "result " + (correct === total ? "ok" : "warn");
  result.textContent = `Resultat: ${correct} / ${total}`;
}

function nextText() {
  currentIndex++;
  if (currentIndex >= readingFiles.length) currentIndex = 0;
  loadCurrentText();
}

function prevText() {
  currentIndex--;
  if (currentIndex < 0) currentIndex = readingFiles.length - 1;
  loadCurrentText();
}

loadCurrentText();
</script>
</body>
</html>
